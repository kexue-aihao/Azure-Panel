; aaPanel Supervisor 配置 — Web 进程
; 在 aaPanel「软件商店」→ Supervisor → 添加守护进程，或复制到 /etc/supervisor/conf.d/

[program:azure-panel-web]
command=/usr/bin/node /www/wwwroot/azure-panel/build/index.js
directory=/www/wwwroot/azure-panel
user=www
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stdout_logfile=/www/wwwlogs/azure-panel-web.log
stderr_logfile=/www/wwwlogs/azure-panel-web-error.log
environment=NODE_ENV="production",HOST="127.0.0.1",PORT="3000"
