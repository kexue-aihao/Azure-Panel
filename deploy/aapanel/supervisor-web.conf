; aaPanel Supervisor config - Node compatibility backend for Azure Panel Go runtime

[program:azure-panel-web]
command=/usr/bin/node /www/wwwroot/azure-panel/build/index.js
directory=/www/wwwroot/azure-panel
user=www
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stdout_logfile=/www/wwwlogs/azure-panel-web.log
stderr_logfile=/www/wwwlogs/azure-panel-web-error.log
environment=NODE_ENV="production",ENABLE_EMBEDDED_WORKER="false",HOST="127.0.0.1",PORT="3001"
